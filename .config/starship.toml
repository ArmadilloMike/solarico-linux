"$schema" = 'https://starship.rs/config-schema.json'

palette = 'nord'

format = '''$hostname | $username
$directory$gitstatus$pythonпЃ”
'''

[username]
show_always = true
style_user = "bold fg:nord9"
style_root = "bold fg:nord11"
format = "[$user]($style)"

[hostname]
style = "bold fg:nord10"
ssh_only=false
format = "[$hostname]($style)"

[directory]
style = "bold fg:nord8"
truncation_length = 3
truncate_to_repo = true
read_only = " пЂЈ"
read_only_style = "fg:nord11"

[git_status]
style = "fg:nord14"
conflicted = "у±ђ‹"
ahead = "в‡Ў${count}"
behind = "в‡Ј${count}"
diverged = "в‡•в‡Ў{ahead_count}в‡Ј{behind_count}"
untracked = "?${count}"
stashed = "пЂ…"
modified = "!${count}"
staged = "+${count}"
renamed = "п„Ѓ${count}"
deleted = "X${count}"
format = "([$all_status$ahead_behind]($style) )"

[python]
style = "fg:nord13"
symbol = "оњј"
format = "[$symbol($version)]($style)"

[character]
success_symbol = "[пЃ”](bold fg:nord14)"
error_symbol = "[пЃ”](bold fg:nord11)"

[palettes.nord]
