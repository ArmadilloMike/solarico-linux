[colors]
background = #2E3440
background-alt = #3B4252
foreground = #D8DEE9
foreground-alt = #4C566A
primary = #88C0D0
secondary = #81A1C1
alert = #BF616A
disabled = #4C566A

[bar/main]
width = 100%
height = 28pt
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
line-color = ${colors.primary}

border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator =  
separator-foreground = ${colors.disabled}

font-0 = "JetBrains Mono:style=Regular:size=10;2"

modules-left = i3
modules-right = network pulseaudio tray date powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

label-focused = %name%
label-focused-foreground = ${colors.primary}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.foreground-alt}
label-visible-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/network]
type = internal/network
interface-type = wireless
interval = 5

label-connected = %essid%
label-connected-foreground = ${colors.foreground}

label-disconnected = disconnected
label-disconnected-foreground = ${colors.disabled} 

[module/tray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = vol %percentage%
label-volume-foreground = ${colors.foreground}

label-muted = muted
label-muted-foreground = ${colors.disabled}

click-right = pavucontrol

[module/date]
type = internal/date
interval = 1

date = %a %b %d
time = %H:%M

label = %date% %time%
label-foreground = ${colors.foreground}

[module/powermenu]
type = custom/text
content = ⏻
content-foreground = ${colors.foreground}
click-left = ~/.config/polybar/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true
